name: COT Data CFTC
on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * 5'

permissions:
  contents: write

jobs:
  fetch-cot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate COT data
        run: |
          python3 -c "
          import json, datetime
          data = {
            'generated': datetime.datetime.utcnow().isoformat() + 'Z',
            'source': 'Test',
            'pairs': {
              'EURUSD': {'pos': 42000, 'dir': 'haussier', 'change': 1200, 'momentum': 'stable', 'date': '2026-04-04', 'source': 'Test'},
              'GBPUSD': {'pos': 15000, 'dir': 'haussier', 'change': -500, 'momentum': 'stable', 'date': '2026-04-04', 'source': 'Test'},
              'USDJPY': {'pos': -45000, 'dir': 'baissier', 'change': -2100, 'momentum': 'deceleration', 'date': '2026-04-04', 'source': 'Test'},
              'GBPJPY': {'pos': 12000, 'dir': 'haussier', 'change': 800, 'momentum': 'stable', 'date': '2026-04-04', 'source': 'Test'},
              'XAUUSD': {'pos': 185000, 'dir': 'haussier', 'change': 3200, 'momentum': 'acceleration', 'date': '2026-04-04', 'source': 'Test'},
              'NAS100': {'pos': 28000, 'dir': 'haussier', 'change': 1500, 'momentum': 'stable', 'date': '2026-04-04', 'source': 'Test'}
            }
          }
          open('cot.json','w').write(__import__('json').dumps(data, indent=2))
          print('OK')
          "

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cot.json
          git diff --staged --quiet || git commit -m "cot: update $(date -u +'%Y-%m-%d')"
          git push
