name: COT Data — CFTC Weekly
on:
  schedule:
    - cron: '0 22 * * 5'   # Vendredi 22h UTC (après publication CFTC ~21h30)
    - cron: '0 8  * * 6'   # Samedi 8h UTC (retry si vendredi raté)
  workflow_dispatch:         # Manuel si besoin

jobs:
  fetch-cot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch COT data from CFTC
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, datetime

          CFTC_CODES = {
            'EURUSD': '099741',
            'GBPUSD': '096742',
            'USDJPY': '097741',
            'GBPJPY': '096742',
            'XAUUSD': '088691',
            'NAS100': '209742',
          }

          BASE_URL = 'https://publicreporting.cftc.gov/api/explore/v2.1/catalog/datasets/fut_disagg_txt/records'

          results = {}
          for sym, code in CFTC_CODES.items():
            url = (BASE_URL
              + f'?limit=2'
              + f'&refine=cftc_contract_market_code:{code}'
              + f'&order_by=report_date_as_yyyy_mm_dd+desc'
              + f'&select=report_date_as_yyyy_mm_dd,noncomm_positions_long_all,'
              + f'noncomm_positions_short_all,change_in_noncomm_long_all,change_in_noncomm_short_all'
            )
            try:
              req = urllib.request.Request(url, headers={'User-Agent': 'FXPROv4/1.0'})
              resp = urllib.request.urlopen(req, timeout=15)
              data = json.loads(resp.read().decode())
              recs = data.get('results') or data.get('records') or []
              if not recs:
                print(f"  {sym}: no records")
                continue

              r = recs[0]
              long_pos  = int(r.get('noncomm_positions_long_all')  or 0)
              short_pos = int(r.get('noncomm_positions_short_all') or 0)
              chg_long  = int(r.get('change_in_noncomm_long_all')  or 0)
              chg_short = int(r.get('change_in_noncomm_short_all') or 0)
              net       = long_pos - short_pos
              net_chg   = chg_long - chg_short
              threshold = max(5000, abs(net) * 0.05)
              direction = 'haussier' if net > threshold else 'baissier' if net < -threshold else 'neutre'
              momentum  = 'acceleration' if net_chg > 2000 else 'deceleration' if net_chg < -2000 else 'stable'

              results[sym] = {
                'pos':       net,
                'longPos':   long_pos,
                'shortPos':  short_pos,
                'dir':       direction,
                'change':    net_chg,
                'momentum':  momentum,
                'date':      r.get('report_date_as_yyyy_mm_dd', '—'),
                'source':    'CFTC officiel'
              }
              print(f"  {sym}: net={net:+,} ({direction}) date={results[sym]['date']}")
            except Exception as e:
              print(f"  {sym}: ERREUR {e}")

          output = {
            'generated': datetime.datetime.utcnow().isoformat() + 'Z',
            'source': 'CFTC publicreporting.cftc.gov',
            'pairs': results
          }

          with open('cot.json', 'w') as f:
            json.dump(output, f, indent=2)

          print(f"\ncot.json généré: {len(results)} paires")
          PYEOF

      - name: Commit cot.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cot.json
          git diff --staged --quiet || git commit -m "chore: COT CFTC $(date -u +'%Y-%m-%d')"
          git push
