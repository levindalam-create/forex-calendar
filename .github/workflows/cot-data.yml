name: COT Data CFTC
on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * 5'

permissions:
  contents: write

jobs:
  fetch-cot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch and write cot.json
        uses: actions/github-script@v7
        with:
          script: |
            const https = require('https');
            const fs = require('fs');

            const CODES = {
              EURUSD: '099741', GBPUSD: '096742', USDJPY: '097741',
              GBPJPY: '096742', XAUUSD: '088691', NAS100: '209742'
            };

            const FALLBACK = {
              EURUSD: {pos:42000,  dir:'haussier', change:1200,  momentum:'stable'},
              GBPUSD: {pos:15000,  dir:'haussier', change:-500,  momentum:'stable'},
              USDJPY: {pos:-45000, dir:'baissier', change:-2100, momentum:'deceleration'},
              GBPJPY: {pos:12000,  dir:'haussier', change:800,   momentum:'stable'},
              XAUUSD: {pos:185000, dir:'haussier', change:3200,  momentum:'acceleration'},
              NAS100: {pos:28000,  dir:'haussier', change:1500,  momentum:'stable'}
            };

            function fetchUrl(url) {
              return new Promise((resolve, reject) => {
                https.get(url, {headers: {'User-Agent':'Mozilla/5.0','Accept':'application/json'}}, res => {
                  let data = '';
                  res.on('data', c => data += c);
                  res.on('end', () => resolve(JSON.parse(data)));
                }).on('error', reject);
              });
            }

            const results = {};
            for (const [sym, code] of Object.entries(CODES)) {
              const url = `https://publicreporting.cftc.gov/api/explore/v2.1/catalog/datasets/fut_disagg_txt/records?limit=1&refine=cftc_contract_market_code:${code}&order_by=report_date_as_yyyy_mm_dd+desc&select=report_date_as_yyyy_mm_dd,noncomm_positions_long_all,noncomm_positions_short_all,change_in_noncomm_long_all,change_in_noncomm_short_all`;
              try {
                const data = await fetchUrl(url);
                const recs = data.results || data.records || [];
                if (!recs.length) throw new Error('no records');
                const r = recs[0];
                const lp = parseInt(r.noncomm_positions_long_all || 0);
                const sp = parseInt(r.noncomm_positions_short_all || 0);
                const cl = parseInt(r.change_in_noncomm_long_all || 0);
                const cs = parseInt(r.change_in_noncomm_short_all || 0);
                const net = lp - sp;
                const chg = cl - cs;
                const thr = Math.max(5000, Math.abs(net) * 0.05);
                const dir = net > thr ? 'haussier' : net < -thr ? 'baissier' : 'neutre';
                const mom = chg > 2000 ? 'acceleration' : chg < -2000 ? 'deceleration' : 'stable';
                results[sym] = {pos:net, longPos:lp, shortPos:sp, dir, change:chg,
                  momentum:mom, date:r.report_date_as_yyyy_mm_dd||'', source:'CFTC officiel'};
                console.log(`OK ${sym}: net=${net} dir=${dir}`);
              } catch(e) {
                console.log(`FALLBACK ${sym}: ${e.message}`);
                const fb = FALLBACK[sym];
                results[sym] = {...fb, date:'', source:'Fallback'};
              }
            }

            const output = {
              generated: new Date().toISOString(),
              source: 'CFTC+fallback',
              pairs: results
            };

            fs.writeFileSync('cot.json', JSON.stringify(output, null, 2));
            console.log(`Done: ${Object.keys(results).length} pairs`);

      - name: Show result
        run: cat cot.json

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cot.json
          git diff --staged --quiet && echo "No changes" || git commit -m "cot: CFTC $(date -u +'%Y-%m-%d')"
          git push
