name: Update Market Data

on:
  schedule:
    - cron: '0,15,30,45 7-21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Setup Node.js 24
        run: |
          curl -fsSL https://deb.nodesource.com/setup_24.x | sudo -E bash - 2>/dev/null
          sudo apt-get install -y nodejs 2>/dev/null
          node --version

      - name: Clone repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git /tmp/repo
          cd /tmp/repo
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Fetch market data
        env:
          TD_KEY:   ${{ secrets.TD_KEY }}
          AV_KEY:   ${{ secrets.AV_KEY }}
          NEWS_KEY: ${{ secrets.NEWS_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
        run: |
          cd /tmp/repo
          node fetch_data.js
          echo "=== Files after fetch ==="
          ls -la *.json 2>/dev/null || echo "No JSON files"

      - name: Commit and push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
        run: |
          cd /tmp/repo
          echo "=== Git status before add ==="
          git status
          git add -f meta.json ohlc.json news.json cot.json
          echo "=== Git status after add ==="
          git status
          if [ -z "$(git status --short)" ]; then
            echo "No changes to commit"
          else
            git commit -m "data: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git HEAD:main
            echo "Pushed OK"
          fi
