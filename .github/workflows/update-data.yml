name: Update Market Data

on:
  schedule:
    # Toutes les heures du lundi au vendredi (marché ouvert)
    - cron: '0 * * * 1-5'
  workflow_dispatch: # Permet de lancer manuellement

jobs:
  update-market-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch market news
        run: |
          node << 'EOF'
          const https = require('https');
          const fs = require('fs');
          
          // Calcul heure Paris
          const now = new Date();
          const utcH = now.getUTCHours();
          const month = now.getMonth() + 1;
          const isDST = month >= 3 && month <= 10;
          const parisH = (utcH + (isDST ? 2 : 1)) % 24;
          
          // Ne pas tourner le week-end
          const day = now.getUTCDay();
          if (day === 0 || day === 6) {
            console.log('Weekend - skip');
            process.exit(0);
          }
          
          const newsKey = process.env.NEWS_API_KEY;
          const since = new Date(Date.now() - 86400000).toISOString().split('T')[0];
          
          let articles = [];
          
          // Fetch NewsAPI si clé disponible
          if (newsKey) {
            const url = `https://newsapi.org/v2/everything?q=forex+OR+fed+OR+BCE+OR+inflation+OR+NFP&language=en&sortBy=publishedAt&from=${since}&apiKey=${newsKey}&pageSize=20`;
            
            await new Promise((resolve) => {
              https.get(url, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try {
                    const d = JSON.parse(data);
                    if (d.articles) articles = d.articles.slice(0, 20);
                    console.log('NewsAPI:', articles.length, 'articles');
                  } catch(e) { console.error('NewsAPI parse error:', e.message); }
                  resolve();
                });
              }).on('error', (e) => { console.error('NewsAPI error:', e.message); resolve(); });
            });
          }
          
          // Fallback: news statiques enrichies si pas de clé
          if (articles.length === 0) {
            articles = [
              { title: 'Fed - Taux directeurs et perspectives monetaires', description: 'La Reserve Federale surveille les indicateurs economiques. Les marches attendent les prochaines declarations des membres du FOMC.', source: { name: 'Reuters' }, publishedAt: new Date().toISOString(), impact: 'VH', currency: 'USD' },
              { title: 'BCE - Politique monetaire zone euro', description: 'La Banque Centrale Europeenne ajuste sa politique en fonction des donnees inflation. EUR/USD sous surveillance.', source: { name: 'Bloomberg' }, publishedAt: new Date(Date.now()-3600000).toISOString(), impact: 'VH', currency: 'EUR' },
              { title: 'NFP Non Farm Payrolls - Emploi americain', description: 'Le rapport emploi americain reste le principal indicateur pour la politique Fed. Volatilite forte attendue sur les paires USD.', source: { name: 'FXStreet' }, publishedAt: new Date(Date.now()-7200000).toISOString(), impact: 'VH', currency: 'USD' },
              { title: 'Bank of Japan - Politique monetaire', description: 'La BOJ surveille de pres le taux de change USD/JPY. Des interventions restent possibles si la depreciation du yen accelere.', source: { name: 'Nikkei' }, publishedAt: new Date(Date.now()-10800000).toISOString(), impact: 'H', currency: 'JPY' },
              { title: 'Or XAU/USD - Record historique 2026', description: 'Le prix de l or atteint de nouveaux sommets portes par les tensions geopolitiques et la demande des banques centrales.', source: { name: 'Kitco' }, publishedAt: new Date(Date.now()-14400000).toISOString(), impact: 'H', currency: 'XAU' },
              { title: 'DXY Dollar Index - Biais macro', description: 'L indice dollar evolue en fonction des differences de taux entre la Fed et les autres banques centrales. Impact direct sur toutes les paires USD.', source: { name: 'DailyFX' }, publishedAt: new Date(Date.now()-18000000).toISOString(), impact: 'H', currency: 'USD' },
              { title: 'PMI manufacturier - Indicateurs economiques', description: 'Les indices PMI donnent un signal avance sur l activite economique. Un PMI sous 50 signale une contraction.', source: { name: 'Investing' }, publishedAt: new Date(Date.now()-21600000).toISOString(), impact: 'H', currency: 'EUR' },
              { title: 'CPI Inflation - Indicateur cle', description: 'L inflation reste le principal facteur determinant les decisions des banques centrales mondiales. Impact direct sur les taux directeurs.', source: { name: 'FT' }, publishedAt: new Date(Date.now()-25200000).toISOString(), impact: 'H', currency: 'USD' },
            ];
          }
          
          // Determiner le sentiment pour chaque devise
          const sentiment = {};
          const currencies = ['USD', 'EUR', 'GBP', 'JPY', 'XAU'];
          const bullWords = ['rise','rally','gain','surge','bullish','hausse','strong','beat','above','higher','optimism','recovery'];
          const bearWords = ['fall','drop','decline','bearish','baisse','weak','below','miss','lower','concern','risk','recession','slowdown'];
          
          currencies.forEach(ccy => {
            const related = articles.filter(a => {
              const t = ((a.title||'') + (a.description||'')).toLowerCase();
              return t.includes(ccy.toLowerCase()) || (a.currency === ccy);
            });
            const allArticles = related.length > 0 ? related : articles;
            let score = 0;
            allArticles.forEach(a => {
              const t = ((a.title||'') + (a.description||'')).toLowerCase();
              bullWords.forEach(w => { if(t.includes(w)) score++; });
              bearWords.forEach(w => { if(t.includes(w)) score--; });
            });
            sentiment[ccy] = score > 2 ? 'haussier' : score < -2 ? 'baissier' : 'neutre';
          });
          
          // Ecrire le fichier news.json
          const output = {
            updated: now.toISOString(),
            parisHour: parisH,
            articles: articles.slice(0, 15).map(a => ({
              title: a.title,
              description: a.description || '',
              source: (a.source && a.source.name) || 'Source',
              publishedAt: a.publishedAt || now.toISOString(),
              impact: a.impact || 'M',
              currency: a.currency || 'USD'
            })),
            sentiment: sentiment
          };
          
          fs.writeFileSync('news.json', JSON.stringify(output, null, 2));
          console.log('news.json updated:', output.articles.length, 'articles, sentiment:', JSON.stringify(sentiment));
          
          EOF
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}

      - name: Commit and push news.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add news.json
          git diff --staged --quiet || git commit -m "chore: update market news [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
        continue-on-error: true
