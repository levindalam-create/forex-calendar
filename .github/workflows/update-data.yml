name: Update Market Data

on:
  schedule:
    - cron: '0 * * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-market-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate news.json
        run: |
          node - << 'NODEJS'
          const https = require('https');
          const fs = require('fs');

          const now = new Date();
          const day = now.getUTCDay();

          if (day === 0 || day === 6) {
            console.log('Weekend - skip, writing empty file');
            fs.writeFileSync('news.json', JSON.stringify({updated:now.toISOString(),weekend:true,articles:[],sentiment:{}}));
            process.exit(0);
          }

          const newsKey = process.env.NEWS_API_KEY || '';
          const since = new Date(Date.now() - 86400000).toISOString().split('T')[0];

          var bull = ['rise','rally','gain','surge','bullish','strong','beat','above','higher','optimism'];
          var bear = ['fall','drop','decline','bearish','weak','below','miss','lower','concern','recession'];

          function calcSent(articles, ccy) {
            var sc = 0;
            articles.forEach(function(a) {
              var t = ((a.title||'')+(a.description||'')).toLowerCase();
              if (ccy && a.currency && a.currency !== ccy) return;
              bull.forEach(function(w){if(t.includes(w)) sc++;});
              bear.forEach(function(w){if(t.includes(w)) sc--;});
            });
            return sc>2?'haussier':sc<-2?'baissier':'neutre';
          }

          var STATIC = [
            {title:'Fed taux directeurs - Perspectives monetaires',description:'Reserve Federale surveille indicateurs economiques. Marches attendent declarations FOMC prochaines semaines.',source:'Reuters',publishedAt:now.toISOString(),impact:'VH',currency:'USD'},
            {title:'BCE politique monetaire zone euro',description:'BCE ajuste politique selon donnees inflation. EUR/USD sous surveillance institutionnelle. Prochaine decision juin.',source:'Bloomberg',publishedAt:new Date(now-3600000).toISOString(),impact:'VH',currency:'EUR'},
            {title:'NFP Non Farm Payrolls emploi americain',description:'Rapport emploi americain principal indicateur Fed. Fort impact attendu sur paires USD vendredi.',source:'FXStreet',publishedAt:new Date(now-7200000).toISOString(),impact:'VH',currency:'USD'},
            {title:'Bank of Japan politique monetaire yen',description:'BOJ surveille USD/JPY. Interventions possibles si depreciation yen accelere au dela de 160.',source:'Nikkei',publishedAt:new Date(now-10800000).toISOString(),impact:'H',currency:'JPY'},
            {title:'Or XAU/USD niveau historique 2026',description:'Prix or soutenu par tensions geopolitiques et achats massifs banques centrales. ATR journalier eleve.',source:'Kitco',publishedAt:new Date(now-14400000).toISOString(),impact:'H',currency:'XAU'},
            {title:'DXY Dollar Index biais macro',description:'Indice dollar evolue selon differences de taux entre Fed et autres banques centrales mondiales.',source:'DailyFX',publishedAt:new Date(now-18000000).toISOString(),impact:'H',currency:'USD'},
            {title:'PMI manufacturier indicateurs avances',description:'PMI signal avance sur activite economique. Valeur sous 50 signale contraction. Impact EUR et GBP.',source:'Investing',publishedAt:new Date(now-21600000).toISOString(),impact:'H',currency:'EUR'},
            {title:'CPI inflation facteur cle banques centrales',description:'Inflation reste principal facteur determinant decisions taux directeurs mondiaux. Impact direct forex.',source:'FT',publishedAt:new Date(now-25200000).toISOString(),impact:'H',currency:'USD'},
          ];

          function writeOutput(articles) {
            var currencies = ['USD','EUR','GBP','JPY','XAU'];
            var sent = {};
            currencies.forEach(function(c){ sent[c] = calcSent(articles, c); });

            var month = now.getMonth()+1;
            var parisH = (now.getUTCHours()+(month>=3&&month<=10?2:1))%24;

            var out = {
              updated: now.toISOString(),
              parisHour: parisH,
              articles: articles.slice(0,15).map(function(a){
                return {
                  title: String(a.title||''),
                  description: String(a.description||''),
                  source: String((a.source&&a.source.name)||a.source||''),
                  publishedAt: String(a.publishedAt||now.toISOString()),
                  impact: String(a.impact||'M'),
                  currency: String(a.currency||'USD')
                };
              }),
              sentiment: sent
            };
            fs.writeFileSync('news.json', JSON.stringify(out, null, 2));
            console.log('news.json written OK -', out.articles.length, 'articles');
            console.log('Sentiment:', JSON.stringify(sent));
          }

          if (!newsKey) {
            console.log('No API key - using static news');
            writeOutput(STATIC);
            return;
          }

          var url = 'https://newsapi.org/v2/everything?q=forex+OR+fed+OR+BCE+OR+inflation+OR+NFP&language=en&sortBy=publishedAt&from='+since+'&apiKey='+newsKey+'&pageSize=20';
          var req = https.get(url, function(res) {
            var data = '';
            res.on('data', function(c){ data+=c; });
            res.on('end', function(){
              try {
                var d = JSON.parse(data);
                if (d.articles && d.articles.length > 0) {
                  console.log('NewsAPI OK:', d.articles.length, 'articles');
                  writeOutput(d.articles);
                } else {
                  console.log('NewsAPI empty, using static');
                  writeOutput(STATIC);
                }
              } catch(e) {
                console.log('NewsAPI parse error, using static:', e.message);
                writeOutput(STATIC);
              }
            });
          });
          req.on('error', function(e){
            console.log('NewsAPI error, using static:', e.message);
            writeOutput(STATIC);
          });
          NODEJS
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}

      - name: Commit and push news.json
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add news.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update market news $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
